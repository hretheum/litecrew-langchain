stages:
  - test
  - security
  - build
  - deploy
  - backup

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  IMAGE_NAME: $CI_REGISTRY_IMAGE/litecrewai
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  # Cache configuration
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_WHEEL_DIR: "$CI_PROJECT_DIR/.cache/wheels"
  DOCKER_BUILDKIT: 1

# Global cache configuration
.cache_config: &cache_config
  cache:
    key:
      files:
        - requirements*.txt
        - pyproject.toml
    paths:
      - .cache/pip
      - .cache/wheels
      - .pip/wheelhouse
      - venv/
    policy: pull-push

# Test stage
test:unit:
  stage: test
  image: python:3.12-slim
  <<: *cache_config
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip wheel setuptools
    - |
      if [ -f "requirements.txt" ]; then
        pip install -r requirements.txt
      elif [ -f "litecrew-langchain/requirements.txt" ]; then
        pip install -r litecrew-langchain/requirements.txt
      fi
    - |
      if [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
        pip install -e .[dev] || pip install -e .
      elif [ -f "litecrew-langchain/setup.py" ]; then
        cd litecrew-langchain && pip install -e . && cd ..
      fi
    - pip install pytest pytest-asyncio pytest-cov
  script:
    - source venv/bin/activate
    - |
      if [ -d "tests/" ]; then
        pytest tests/ -v --cov=tests --cov-report=html --cov-report=term --cov-report=xml --cov-fail-under=70
      elif [ -d "litecrew-langchain/tests/" ]; then
        cd litecrew-langchain && pytest tests/ -v --cov=src/litecrew --cov-report=html --cov-report=term --cov-report=xml --cov-fail-under=70
      else
        echo "No tests directory found, skipping tests"
      fi
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - htmlcov/
      - coverage.xml
    expire_in: 1 week
  only:
    - branches
    - merge_requests

lint:
  stage: test
  image: python:3.12-slim
  <<: *cache_config
  allow_failure: true
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip wheel setuptools
    - pip install black ruff mypy
  script:
    - source venv/bin/activate
    - |
      if [ -d "app/" ]; then
        black --check app/
        ruff check app/
        mypy app/ --ignore-missing-imports
      elif [ -d "src/" ]; then
        black --check src/
        ruff check src/
        mypy src/ --ignore-missing-imports
      elif [ -d "litecrew-langchain/src/" ]; then
        black --check litecrew-langchain/src/
        ruff check litecrew-langchain/src/
        mypy litecrew-langchain/src/ --ignore-missing-imports
      else
        echo "No source directory found, skipping lint"
      fi
  only:
    - branches
    - merge_requests

# Security scanning stage
security:bandit:
  stage: security
  image: python:3.12-slim
  <<: *cache_config
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip wheel setuptools
    - pip install bandit[toml] safety pip-audit
  script:
    - source venv/bin/activate
    # Static security analysis with bandit
    - |
      if [ -d "app/src" ]; then
        bandit -r app/src -f json -o bandit-report.json || true
        bandit -r app/src -f txt
      elif [ -d "src" ]; then
        bandit -r src -f json -o bandit-report.json || true
        bandit -r src -f txt
      elif [ -d "litecrew-langchain/src" ]; then
        bandit -r litecrew-langchain/src -f json -o bandit-report.json || true
        bandit -r litecrew-langchain/src -f txt
      else
        echo "No source directory found, skipping bandit"
      fi
    # Dependency vulnerability scanning
    - safety check --json --output safety-report.json || true
    - safety check
    # Pip dependency audit
    - pip-audit --desc --output=json --output-file=pip-audit-report.json || true
    - pip-audit --desc
  artifacts:
    reports:
      # GitLab security dashboard integration
      sast: bandit-report.json
    paths:
      - bandit-report.json
      - safety-report.json  
      - pip-audit-report.json
    expire_in: 1 week
    when: always
  allow_failure: false  # Block pipeline on security issues
  only:
    - branches
    - merge_requests

security:secrets:
  stage: security
  image: alpine:latest
  before_script:
    - apk add --no-cache git
    - wget -O gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
    - tar -xzf gitleaks.tar.gz
    - chmod +x gitleaks
    - mv gitleaks /usr/local/bin/
  script:
    # Scan for secrets in git history and current files
    - gitleaks detect --source . --report-format json --report-path gitleaks-report.json || true
    - gitleaks detect --source . --report-format sarif --report-path gitleaks-report.sarif || true
    - gitleaks detect --source . --verbose
  artifacts:
    reports:
      # GitLab security dashboard integration
      secret_detection: gitleaks-report.sarif
    paths:
      - gitleaks-report.json
      - gitleaks-report.sarif
    expire_in: 1 week
    when: always
  allow_failure: false  # Block pipeline on secret detection
  only:
    - branches
    - merge_requests

security:container:
  stage: security
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Install Trivy for container vulnerability scanning
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    # Build image for scanning
    - DOCKER_BUILDKIT=1 docker build -t $IMAGE_NAME:security-scan .
    # Scan image for vulnerabilities
    - trivy image --format json --output trivy-report.json $IMAGE_NAME:security-scan || true
    - trivy image --format sarif --output trivy-report.sarif $IMAGE_NAME:security-scan || true
    - trivy image --severity HIGH,CRITICAL $IMAGE_NAME:security-scan
  artifacts:
    reports:
      # GitLab security dashboard integration  
      container_scanning: trivy-report.sarif
    paths:
      - trivy-report.json
      - trivy-report.sarif
    expire_in: 1 week
    when: always
  allow_failure: true  # Don't block on container issues initially
  only:
    - branches
    - merge_requests

# Build stage
build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Build with BuildKit for better caching
    - DOCKER_BUILDKIT=1 docker build 
      --cache-from $IMAGE_NAME:latest 
      --build-arg BUILDKIT_INLINE_CACHE=1 
      -t $IMAGE_NAME:$IMAGE_TAG .
    - docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest
  cache:
    key: docker-layers-$CI_COMMIT_REF_SLUG
    paths:
      - /var/lib/docker
  only:
    - main
    - master

# Deploy stage
deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H -p 2222 $DROPLET_IP >> ~/.ssh/known_hosts
  script:
    - |
      ssh -p 2222 litecrewai@$DROPLET_IP << 'EOF'
        set -e
        echo "🚀 Starting deployment..."
        
        # Backup current version
        if [ -d /opt/litecrewai/app ]; then
          sudo tar -czf /opt/litecrewai/backups/backup-$(date +%Y%m%d-%H%M%S).tar.gz \
            -C /opt/litecrewai app data config
        fi
        
        # Pull latest code
        cd /opt/litecrewai
        git pull origin main || git pull origin master
        
        # Update Docker image
        docker compose pull
        
        # Stop current container
        docker compose down
        
        # Run database migrations if needed
        # docker compose run --rm litecrewai alembic upgrade head
        
        # Start new version
        docker compose up -d
        
        # Health check with automatic rollback on failure
        sleep 10
        if ! curl -f http://localhost:8000/health; then
          echo "❌ Health check failed! Starting automatic rollback..."
          
          # Find latest backup
          LATEST_BACKUP=$(ls -t /opt/litecrewai/backups/*.tar.gz | head -1)
          
          if [ ! -z "$LATEST_BACKUP" ]; then
            docker compose down
            sudo tar -xzf "$LATEST_BACKUP" -C /opt/litecrewai
            docker compose up -d
            echo "✅ Automatic rollback completed!"
          else
            echo "❌ No backup found for rollback!"
          fi
          
          exit 1
        fi
        
        echo "✅ Deployment successful!"
      EOF
  environment:
    name: production
    url: http://$DROPLET_IP
  only:
    - main
    - master
  when: manual

# Rollback job
rollback:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H -p 2222 $DROPLET_IP >> ~/.ssh/known_hosts
  script:
    - |
      ssh -p 2222 litecrewai@$DROPLET_IP << 'EOF'
        set -e
        echo "🔄 Starting rollback..."
        
        # Find latest backup
        LATEST_BACKUP=$(ls -t /opt/litecrewai/backups/*.tar.gz | head -1)
        
        if [ -z "$LATEST_BACKUP" ]; then
          echo "❌ No backup found!"
          exit 1
        fi
        
        # Stop current container
        cd /opt/litecrewai
        docker compose down
        
        # Restore from backup
        sudo tar -xzf "$LATEST_BACKUP" -C /opt/litecrewai
        
        # Start previous version
        docker compose up -d
        
        echo "✅ Rollback completed!"
      EOF
  when: manual
  only:
    - main
    - master

# Scheduled backup
backup:daily:
  stage: backup
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H -p 2222 $DROPLET_IP >> ~/.ssh/known_hosts
  script:
    - |
      ssh -p 2222 litecrewai@$DROPLET_IP << 'EOF'
        set -e
        echo "📦 Starting backup..."
        
        # Create backup
        BACKUP_NAME="backup-$(date +%Y%m%d-%H%M%S).tar.gz"
        cd /opt/litecrewai
        
        # Stop container for consistent backup
        docker compose stop litecrewai
        
        # Create backup
        sudo tar -czf "/opt/litecrewai/backups/$BACKUP_NAME" \
          app data config logs
        
        # Encrypt backup if encryption key is set
        if [ ! -z "$BACKUP_ENCRYPTION_KEY" ]; then
          openssl enc -aes-256-cbc -salt -in "/opt/litecrewai/backups/$BACKUP_NAME" \
            -out "/opt/litecrewai/backups/$BACKUP_NAME.enc" \
            -k "$BACKUP_ENCRYPTION_KEY"
          rm "/opt/litecrewai/backups/$BACKUP_NAME"
          BACKUP_NAME="$BACKUP_NAME.enc"
        fi
        
        # Start container again
        docker compose start litecrewai
        
        # Clean old backups (keep last 7 days)
        find /opt/litecrewai/backups -name "backup-*.tar.gz*" -mtime +7 -delete
        
        echo "✅ Backup completed: $BACKUP_NAME"
      EOF
  only:
    - schedules