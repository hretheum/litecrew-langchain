stages:
  - test
  - security
  - build
  - deploy

# Workflow rules
workflow:
  rules:
    # Skip everything except deploy:quick when only CI files change
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - ".gitlab-ci.yml"
        - ".gitlab-ci*.yml"
        - "**/.gitlab-ci*.yml"
      variables:
        SKIP_TESTS: "true"
    # Normal flow for everything else
    - when: always

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  IMAGE_NAME: $CI_REGISTRY_IMAGE/litecrewai
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  # Cache configuration
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_WHEEL_DIR: "$CI_PROJECT_DIR/.cache/wheels"
  DOCKER_BUILDKIT: 1
  # Speed up builds
  FF_USE_FASTZIP: "true"
  ARTIFACT_COMPRESSION_LEVEL: "fast"
  CACHE_COMPRESSION_LEVEL: "fast"
  TRANSFER_METER_FREQUENCY: "5s"

# Global cache configuration
.cache_config: &cache_config
  cache:
    key:
      files:
        - requirements*.txt
        - pyproject.toml
    paths:
      - .cache/pip
      - .cache/wheels
      - .pip/wheelhouse
      - venv/
    policy: pull-push

# Test stage
test:unit:
  stage: test
  image: python:3.12-slim
  <<: *cache_config
  interruptible: true
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip wheel setuptools
    - |
      # Install from litecrew-langchain directory
      if [ -d "litecrew-langchain" ]; then
        cd litecrew-langchain
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        fi
        if [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
          pip install -e .
        fi
        cd ..
      else
        # Fallback to root directory
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        fi
        if [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
          pip install -e .[dev] || pip install -e .
        fi
      fi
    - pip install pytest pytest-asyncio pytest-cov
  script:
    - source venv/bin/activate
    - |
      # Always cd to litecrew-langchain if it exists
      if [ -d "litecrew-langchain" ]; then
        cd litecrew-langchain
      fi
    - |
      if [ -d "tests/" ]; then
        pytest tests/ -v --cov=src/litecrew --cov-report=html --cov-report=term --cov-report=xml --cov-fail-under=70
        # Copy coverage.xml to root directory for artifact upload
        if [ -f "coverage.xml" ]; then
          cp coverage.xml ../coverage.xml
        fi
        if [ -d "htmlcov/" ]; then
          cp -r htmlcov/ ../htmlcov/
        fi
      else
        echo "No tests directory found, skipping tests"
      fi
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: litecrew-langchain/coverage.xml
    paths:
      - litecrew-langchain/htmlcov/
      - litecrew-langchain/coverage.xml
    expire_in: 1 week
  rules:
    - if: '$SKIP_TESTS == "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'
    - changes:
      - "**/*.py"
      - "**/requirements*.txt"
      - "**/pyproject.toml"
      - "**/setup.py"
      when: on_success

lint:
  stage: test
  image: python:3.12-slim
  <<: *cache_config
  allow_failure: true
  interruptible: true
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip wheel setuptools
    - pip install black ruff mypy
  script:
    - source venv/bin/activate
    - |
      # Always cd to litecrew-langchain if it exists
      if [ -d "litecrew-langchain" ]; then
        cd litecrew-langchain
      fi
    - |
      if [ -d "src/" ]; then
        black --check src/
        ruff check src/
        mypy src/ --ignore-missing-imports
      elif [ -d "app/" ]; then
        black --check app/
        ruff check app/
        mypy app/ --ignore-missing-imports
      else
        echo "No source directory found, skipping lint"
      fi
  rules:
    - if: '$SKIP_TESTS == "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'
    - changes:
      - "**/*.py"
      - "**/requirements*.txt"
      - "**/pyproject.toml"
      - "**/setup.py"
      when: on_success

# Security scanning stage
security:bandit:
  stage: security
  image: python:3.12-slim
  <<: *cache_config
  interruptible: true
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip wheel setuptools
    - pip install bandit[toml] safety pip-audit
  script:
    - source venv/bin/activate
    # Static security analysis with bandit
    - |
      if [ -d "app/src" ]; then
        bandit -r app/src -f json -o bandit-report.json || true
        bandit -r app/src -f txt
      elif [ -d "src" ]; then
        bandit -r src -f json -o bandit-report.json || true
        bandit -r src -f txt
      elif [ -d "litecrew-langchain/src" ]; then
        bandit -r litecrew-langchain/src -f json -o bandit-report.json || true
        bandit -r litecrew-langchain/src -f txt
      else
        echo "No source directory found, skipping bandit"
      fi
    # Dependency vulnerability scanning
    - safety check --json --output safety-report.json || true
    - safety check
    # Pip dependency audit
    - pip-audit --desc --output=json --output-file=pip-audit-report.json || true
    - pip-audit --desc
  artifacts:
    reports:
      # GitLab security dashboard integration
      sast: bandit-report.json
    paths:
      - bandit-report.json
      - safety-report.json  
      - pip-audit-report.json
    expire_in: 1 week
    when: always
  allow_failure: false  # Block pipeline on security issues
  rules:
    - if: '$SKIP_TESTS == "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'
    - changes:
      - "**/*.py"
      - "**/requirements*.txt"
      - "**/pyproject.toml"
      - "**/setup.py"
      when: on_success

# DISABLED - too many false positives
.security:secrets:
  stage: security
  image: alpine:latest
  before_script:
    - apk add --no-cache git
    - wget -O gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
    - tar -xzf gitleaks.tar.gz
    - chmod +x gitleaks
    - mv gitleaks /usr/local/bin/
  script:
    # Only scan current commit changes, not full history
    - |
      echo "Scanning only current commit changes..."
      if [ -n "$CI_MERGE_REQUEST_DIFF_BASE_SHA" ]; then
        echo "Merge request detected, scanning diff from $CI_MERGE_REQUEST_DIFF_BASE_SHA"
        gitleaks detect --source . --log-opts="${CI_MERGE_REQUEST_DIFF_BASE_SHA}..HEAD" --report-format json --report-path gitleaks-report.json --exit-code 0 || true
        gitleaks detect --source . --log-opts="${CI_MERGE_REQUEST_DIFF_BASE_SHA}..HEAD" --report-format sarif --report-path gitleaks-report.sarif --exit-code 0 || true
        gitleaks detect --source . --log-opts="${CI_MERGE_REQUEST_DIFF_BASE_SHA}..HEAD" --verbose
      else
        echo "Regular commit, scanning only this commit"
        gitleaks detect --source . --log-opts="HEAD~1..HEAD" --report-format json --report-path gitleaks-report.json --exit-code 0 || true
        gitleaks detect --source . --log-opts="HEAD~1..HEAD" --report-format sarif --report-path gitleaks-report.sarif --exit-code 0 || true
        gitleaks detect --source . --log-opts="HEAD~1..HEAD" --verbose
      fi
  artifacts:
    reports:
      # GitLab security dashboard integration
      secret_detection: gitleaks-report.sarif
    paths:
      - gitleaks-report.json
      - gitleaks-report.sarif
    expire_in: 1 week
    when: always
  allow_failure: true  # Don't block pipeline on secret detection - too many false positives
  rules:
    - if: '$SKIP_TESTS == "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'
    - changes:
      - "**/*.py"
      - "**/requirements*.txt"
      - "**/pyproject.toml"
      - "**/setup.py"
      when: on_success

security:container:
  stage: security
  image: docker:latest
  services:
    - docker:dind
  interruptible: true
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Install Trivy for container vulnerability scanning
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    # Build image for scanning
    - DOCKER_BUILDKIT=1 docker build -t $IMAGE_NAME:security-scan .
    # Scan image for vulnerabilities
    - trivy image --format json --output trivy-report.json $IMAGE_NAME:security-scan || true
    - trivy image --format sarif --output trivy-report.sarif $IMAGE_NAME:security-scan || true
    - trivy image --severity HIGH,CRITICAL $IMAGE_NAME:security-scan
  artifacts:
    reports:
      # GitLab security dashboard integration  
      container_scanning: trivy-report.sarif
    paths:
      - trivy-report.json
      - trivy-report.sarif
    expire_in: 1 week
    when: always
  allow_failure: true  # Don't block on container issues initially
  rules:
    - if: '$SKIP_TESTS == "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'
    - changes:
      - "**/*.py"
      - "**/requirements*.txt"
      - "**/pyproject.toml"
      - "**/setup.py"
      when: on_success

# Build stage
build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Try to pull previous image for cache
    - docker pull $IMAGE_NAME:latest || true
    # Build with BuildKit for better caching
    - cd litecrew-langchain  # Change to subdirectory for build
    - DOCKER_BUILDKIT=1 docker build 
      --cache-from $IMAGE_NAME:latest 
      --build-arg BUILDKIT_INLINE_CACHE=1 
      -t $IMAGE_NAME:$IMAGE_TAG 
      -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      when: always

# Deploy stage
deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $DROPLET_IP >> ~/.ssh/known_hosts
  script:
    - |
      cat > /tmp/deploy.sh << 'DEPLOY_SCRIPT'
      #!/bin/bash
      set -e
      echo "🚀 Starting deployment..."
      
      # Create directories if needed
      sudo mkdir -p /opt/litecrewai/litecrew-langchain
      sudo chown -R litecrewai:litecrewai /opt/litecrewai
      cd /opt/litecrewai/litecrew-langchain
      
      # Login to GitLab registry
      echo "$1" | sudo docker login -u "$2" --password-stdin "$3"
      
      # Create docker-compose.yml for deployment
      cat > docker-compose.yml << EOF
      version: '3.8'
      services:
        litecrew:
          image: $4
          container_name: litecrew_app
          ports:
            - "8000:8000"
          environment:
            - ENVIRONMENT=production
          restart: unless-stopped
      EOF
      
      # Pull latest image
      sudo docker pull $4
      
      # Stop ALL containers using port 8000
      echo "🛑 Stopping containers on port 8000..."
      sudo docker ps -q --filter "publish=8000" | xargs -r sudo docker stop || true
      sudo docker ps -aq --filter "publish=8000" | xargs -r sudo docker rm || true
      
      # Also stop any litecrew containers by name
      sudo docker ps -q --filter "name=litecrew" | xargs -r sudo docker stop || true
      sudo docker ps -aq --filter "name=litecrew" | xargs -r sudo docker rm || true
      
      # Stop and remove via docker-compose
      sudo docker compose down --remove-orphans || true
      
      # Start new container
      sudo docker compose up -d
      
      # Health check 
      sleep 10
      sudo docker ps
      
      echo "✅ Deployment completed!"
      DEPLOY_SCRIPT
    - chmod +x /tmp/deploy.sh
    - scp /tmp/deploy.sh litecrewai@$DROPLET_IP:/tmp/
    - ssh litecrewai@$DROPLET_IP "/tmp/deploy.sh '$CI_REGISTRY_PASSWORD' '$CI_REGISTRY_USER' '$CI_REGISTRY' '$IMAGE_NAME:$IMAGE_TAG'"
    - ssh litecrewai@$DROPLET_IP "rm /tmp/deploy.sh"
  environment:
    name: production
    url: http://$DROPLET_IP
  only:
    - main
    - master
  when: manual

# Rollback job - simplified to just restart previous image
rollback:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $DROPLET_IP >> ~/.ssh/known_hosts
  script:
    - |
      ssh litecrewai@$DROPLET_IP << EOF
        set -e
        echo "🔄 Starting rollback to previous image..."
        
        cd /opt/litecrewai/litecrew-langchain
        
        # Just restart with previous image tag
        sudo docker compose down
        sudo docker compose up -d
        
        echo "✅ Rollback completed!"
      EOF
  when: manual
  only:
    - main
    - master

# Quick deploy - skip all tests and use existing image
deploy:quick:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $DROPLET_IP >> ~/.ssh/known_hosts
  script:
    - |
      # Use latest image instead of building new one
      QUICK_IMAGE="$IMAGE_NAME:latest"
      echo "🚀 Quick deployment using image: $QUICK_IMAGE"
      
      cat > /tmp/deploy.sh << 'DEPLOY_SCRIPT'
      #!/bin/bash
      set -e
      echo "🚀 Starting quick deployment..."
      
      # Create directories if needed
      sudo mkdir -p /opt/litecrewai/litecrew-langchain
      sudo chown -R litecrewai:litecrewai /opt/litecrewai
      cd /opt/litecrewai/litecrew-langchain
      
      # Login to GitLab registry
      echo "$1" | sudo docker login -u "$2" --password-stdin "$3"
      
      # Create docker-compose.yml for deployment
      cat > docker-compose.yml << EOF
      version: '3.8'
      services:
        litecrew:
          image: $4
          container_name: litecrew_app
          ports:
            - "8000:8000"
          environment:
            - ENVIRONMENT=production
          restart: unless-stopped
      EOF
      
      # Pull latest image
      sudo docker pull $4
      
      # Stop ALL containers using port 8000
      echo "🛑 Stopping containers on port 8000..."
      sudo docker ps -q --filter "publish=8000" | xargs -r sudo docker stop || true
      sudo docker ps -aq --filter "publish=8000" | xargs -r sudo docker rm || true
      
      # Also stop any litecrew containers by name
      sudo docker ps -q --filter "name=litecrew" | xargs -r sudo docker stop || true
      sudo docker ps -aq --filter "name=litecrew" | xargs -r sudo docker rm || true
      
      # Stop and remove via docker-compose
      sudo docker compose down --remove-orphans || true
      
      # Start new container
      sudo docker compose up -d
      
      # Health check 
      sleep 10
      sudo docker ps
      
      echo "✅ Quick deployment completed!"
      DEPLOY_SCRIPT
    - chmod +x /tmp/deploy.sh
    - scp /tmp/deploy.sh litecrewai@$DROPLET_IP:/tmp/
    - ssh litecrewai@$DROPLET_IP "/tmp/deploy.sh '$CI_REGISTRY_PASSWORD' '$CI_REGISTRY_USER' '$CI_REGISTRY' '$QUICK_IMAGE'"
    - ssh litecrewai@$DROPLET_IP "rm /tmp/deploy.sh"
  environment:
    name: production
    url: http://$DROPLET_IP
  when: manual
  rules:
    # Run only when CI files change
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - ".gitlab-ci.yml"
        - ".gitlab-ci*.yml"
        - "**/.gitlab-ci*.yml"
      when: manual
    # Or when manually triggered
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual

