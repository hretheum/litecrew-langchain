# GitLeaks configuration for LiteCrewAI
title = "gitleaks config for LiteCrewAI"

[extend]
# Extend the base configuration
useDefault = true

[allowlist]
description = "Global allowlist"
regexes = [
    '''sk-1234567890abcdef''',
    '''sk-EXAMPLE.*'''
]
paths = [
    '''SECURITY\.md''',
    '''.*\/SECURITY\.md'''
]

[[rules]]
description = "Ignore example API key in SECURITY.md"
regex = '''sk-1234567890abcdef'''
[rules.allowlist]
paths = ['''SECURITY\.md''']