# GitLeaks configuration for LiteCrewAI
title = "gitleaks config for LiteCrewAI"

[extend]
# Extend the base configuration
useDefault = true

[allowlist]
description = "Global allowlist"
regexes = [
    '''sk-1234567890abcdef''',
    '''sk-EXAMPLE.*'''
]
paths = [
    '''SECURITY\.md''',
    '''.*\/SECURITY\.md'''
]