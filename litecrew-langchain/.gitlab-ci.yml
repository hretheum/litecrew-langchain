stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# Test stage
test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -r requirements.txt
    - pip install pytest pytest-asyncio pytest-cov
  script:
    - pytest tests/ -v --cov=src/litecrew --cov-report=term-missing
  only:
    - merge_requests
    - main
    - develop

# Build Docker image
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  only:
    - master
    - develop

# Deploy to production
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -p 2222 -H $DROPLET_IP >> ~/.ssh/known_hosts
  script:
    - |
      ssh -p 2222 litecrewai@$DROPLET_IP << 'ENDSSH'
      set -e
      
      # Create deployment directory if not exists
      mkdir -p /opt/litecrewai/litecrew-langchain
      cd /opt/litecrewai/litecrew-langchain
      
      # Login to GitLab registry
      echo "$CI_REGISTRY_PASSWORD" | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
      
      # Create docker-compose.prod.yml if not exists
      cat > docker-compose.prod.yml << 'EOF'
      version: '3.8'
      
      services:
        litecrew:
          image: ${IMAGE_TAG}
          container_name: litecrew_api
          ports:
            - "8000:8000"
          environment:
            - ENVIRONMENT=production
            - DATABASE_URL=postgresql://litecrew:${DB_PASSWORD}@postgres:5432/litecrew
            - REDIS_URL=redis://redis:6379/0
            - OPENAI_API_KEY=${OPENAI_API_KEY}
            - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            - GROQ_API_KEY=${GROQ_API_KEY}
            - SECRET_KEY=${SECRET_KEY}
            - JWT_SECRET=${JWT_SECRET}
          volumes:
            - ./data:/app/data
            - ./logs:/app/logs
          depends_on:
            - redis
            - postgres
          restart: unless-stopped
          networks:
            - litecrew-network
            
        redis:
          image: redis:7-alpine
          container_name: litecrew_redis
          volumes:
            - redis_data:/data
          restart: unless-stopped
          networks:
            - litecrew-network
          command: redis-server --appendonly yes
            
        postgres:
          image: postgres:15-alpine
          container_name: litecrew_postgres
          environment:
            - POSTGRES_USER=litecrew
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=litecrew
          volumes:
            - postgres_data:/var/lib/postgresql/data
          restart: unless-stopped
          networks:
            - litecrew-network
            
        nginx:
          image: nginx:alpine
          container_name: litecrew_nginx
          ports:
            - "80:80"
            - "443:443"
          volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
            - ./ssl:/etc/nginx/ssl:ro
            - certbot-etc:/etc/letsencrypt
            - certbot-var:/var/lib/letsencrypt
          depends_on:
            - litecrew
          restart: unless-stopped
          networks:
            - litecrew-network
            
      volumes:
        redis_data:
        postgres_data:
        certbot-etc:
        certbot-var:
        
      networks:
        litecrew-network:
          driver: bridge
      EOF
      
      # Pull latest image
      docker pull ${IMAGE_TAG}
      
      # Stop existing containers
      docker-compose -f docker-compose.prod.yml down || true
      
      # Start new containers
      IMAGE_TAG=${IMAGE_TAG} docker-compose -f docker-compose.prod.yml up -d
      
      # Wait for health check
      sleep 10
      
      # Check if services are running
      docker-compose -f docker-compose.prod.yml ps
      
      # Clean up old images
      docker image prune -f
      
      ENDSSH
  environment:
    name: production
    url: http://$DROPLET_IP
  only:
    - master
  when: manual

# Deploy to staging (automatic)
deploy_staging:
  extends: deploy
  environment:
    name: staging
    url: http://$DROPLET_IP:8001
  only:
    - develop
  when: on_success
  variables:
    DEPLOY_PORT: 8001